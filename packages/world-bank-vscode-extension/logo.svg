<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0066CC"/>
      <stop offset="50%" style="stop-color:#0052A3"/>
      <stop offset="100%" style="stop-color:#003D7A"/>
    </linearGradient>
    <linearGradient id="globe" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4DB8FF"/>
      <stop offset="100%" style="stop-color:#0099FF"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00E676"/>
      <stop offset="100%" style="stop-color:#00C853"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD740"/>
      <stop offset="100%" style="stop-color:#FFC400"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6E40"/>
      <stop offset="100%" style="stop-color:#FF3D00"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="256" height="256" rx="40" ry="40" fill="url(#bg)"/>

  <!-- Globe circle -->
  <circle cx="100" cy="88" r="48" fill="none" stroke="url(#globe)" stroke-width="3.5" opacity="0.9"/>
  <!-- Globe horizontal lines -->
  <ellipse cx="100" cy="88" rx="48" ry="18" fill="none" stroke="url(#globe)" stroke-width="2" opacity="0.6"/>
  <ellipse cx="100" cy="88" rx="48" ry="36" fill="none" stroke="url(#globe)" stroke-width="1.5" opacity="0.4"/>
  <!-- Globe vertical meridian -->
  <ellipse cx="100" cy="88" rx="20" ry="48" fill="none" stroke="url(#globe)" stroke-width="2" opacity="0.6"/>
  <!-- Globe center vertical -->
  <line x1="100" y1="40" x2="100" y2="136" stroke="url(#globe)" stroke-width="1.5" opacity="0.4"/>
  <!-- Globe center horizontal -->
  <line x1="52" y1="88" x2="148" y2="88" stroke="url(#globe)" stroke-width="1.5" opacity="0.4"/>

  <!-- Bar chart (right side, overlapping globe) -->
  <rect x="152" y="92" width="18" height="44" rx="3" fill="url(#bar1)" opacity="0.95"/>
  <rect x="175" y="68" width="18" height="68" rx="3" fill="url(#bar2)" opacity="0.95"/>
  <rect x="198" y="48" width="18" height="88" rx="3" fill="url(#bar3)" opacity="0.95"/>

  <!-- Trend line -->
  <polyline points="161,108 184,82 207,58" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  <!-- Trend dots -->
  <circle cx="161" cy="108" r="3.5" fill="#FFFFFF" opacity="0.95"/>
  <circle cx="184" cy="82" r="3.5" fill="#FFFFFF" opacity="0.95"/>
  <circle cx="207" cy="58" r="3.5" fill="#FFFFFF" opacity="0.95"/>

  <!-- "World Bank" text -->
  <text x="128" y="172" text-anchor="middle" font-family="SF Pro Display, Helvetica Neue, Arial, sans-serif" font-size="26" font-weight="700" fill="#FFFFFF" letter-spacing="1">World Bank</text>

  <!-- "MCP SERVER" text -->
  <text x="128" y="200" text-anchor="middle" font-family="SF Pro Display, Helvetica Neue, Arial, sans-serif" font-size="18" font-weight="600" fill="#4DB8FF" letter-spacing="4">MCP SERVER</text>

  <!-- Subtle glow effect on globe -->
  <circle cx="100" cy="88" r="50" fill="none" stroke="#4DB8FF" stroke-width="1" opacity="0.15"/>

  <!-- Small data points scattered on globe -->
  <circle cx="82" cy="76" r="2.5" fill="#00E676" opacity="0.8"/>
  <circle cx="108" cy="70" r="2" fill="#FFD740" opacity="0.8"/>
  <circle cx="92" cy="98" r="2.5" fill="#FF6E40" opacity="0.8"/>
  <circle cx="116" cy="92" r="2" fill="#00E676" opacity="0.8"/>
  <circle cx="78" cy="94" r="1.8" fill="#FFD740" opacity="0.7"/>
  <circle cx="112" cy="80" r="1.8" fill="#4DB8FF" opacity="0.7"/>
</svg>
